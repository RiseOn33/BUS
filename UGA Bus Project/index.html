<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>UGA Bus Tracker</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 16px; }
    .top { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
    .pill { padding: 6px 10px; border-radius: 999px; background: #eee; font-size: 14px; }
    select { padding: 8px 10px; border-radius: 10px; border: 1px solid #ccc; font-size: 14px; }

    .grid { display: grid; gap: 10px; }
    .row {
      padding: 14px 16px;
      border-radius: 12px;
      display: grid;
      grid-template-columns: 1fr 2fr 1fr;
      gap: 12px;
      align-items: center;
      box-shadow: 0 1px 8px rgba(0,0,0,0.08);
    }

    /* per your preference */
    .stopped { background: #b7f7bf; } /* green */
    .driving { background: #ffd2a6; } /* orange */

    .label { font-size: 12px; opacity: 0.75; }
    .value { font-weight: 700; font-size: 18px; }
    .err { background: #ffe3e3; padding: 10px 12px; border-radius: 10px; }
    @media (max-width: 750px){ .row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="top">
    <div class="pill" id="updated">Updated: --:--:--</div>
    <div class="pill" id="status">Status: loading…</div>

    <label class="pill" style="display:flex; gap:8px; align-items:center;">
      Route:
      <select id="routeSelect"></select>
    </label>
  </div>

  <div id="error"></div>
  <div class="grid" id="grid"></div>

<script>
let currentRouteId = null;

function routeLabel(r){
  const name = (r.name || "").trim() || "(unnamed)";
  return `${name} (${r.routeId})`;
}

async function loadRoutes(){
  const sel = document.getElementById("routeSelect");
  const r = await fetch("/api/routes", {cache:"no-store"});
  const j = await r.json();

  sel.innerHTML = "";
  if (!j.routes) return;

  for (const rt of j.routes){
    const opt = document.createElement("option");
    opt.value = rt.routeId;
    opt.textContent = `${rt.name || "(unnamed)"} — ${rt.count} bus(es)`;
    sel.appendChild(opt);
  }

  if (!currentRouteId && j.routes.length){
    currentRouteId = j.routes[0].routeId;
  }
  if (currentRouteId){
    sel.value = currentRouteId;
  }
}

async function refresh(){
  const grid = document.getElementById("grid");
  const updated = document.getElementById("updated");
  const status = document.getElementById("status");
  const error = document.getElementById("error");
  const sel = document.getElementById("routeSelect");

  if (!currentRouteId && sel.value) currentRouteId = sel.value;

  try{
    const r = await fetch(`/api/state?routeId=${encodeURIComponent(currentRouteId || "")}`, {cache:"no-store"});
    const j = await r.json();

    updated.textContent = "Updated: " + (j.updated || "--:--:--");

    if(!j.ok){
      status.textContent = "Status: error";
      error.innerHTML = `<div class="err"><b>Error:</b> ${j.error || "unknown"}</div>`;
      grid.innerHTML = "";
      return;
    }

    status.textContent = "Status: OK";
    error.innerHTML = "";

    // keep dropdown in sync if backend chose a default
    if (j.routeId && j.routeId !== currentRouteId){
      currentRouteId = j.routeId;
      sel.value = currentRouteId;
    }

    grid.innerHTML = "";

    for(const b of (j.buses || [])){
      const cls = (b.status === "STOPPED") ? "row stopped" : "row driving";

      const el = document.createElement("div");
      el.className = cls;
      el.innerHTML = `
        <div>
          <div class="label">Bus</div>
          <div class="value">${b.busName}</div>
        </div>
        <div>
          <div class="label">Location</div>
          <div class="value">${b.location}</div>
        </div>
        <div>
          <div class="label">Last report</div>
          <div class="value">${b.reported || "n/a"}</div>
        </div>
      `;
      grid.appendChild(el);
    }

    if ((j.buses || []).length === 0){
      grid.innerHTML = `<div class="pill">No active buses on this route right now.</div>`;
    }

  } catch(e){
    status.textContent = "Status: error";
    error.innerHTML = `<div class="err"><b>Error:</b> ${e}</div>`;
  }
}

// route change handler
document.getElementById("routeSelect").addEventListener("change", (ev) => {
  currentRouteId = ev.target.value;
  refresh();
});

(async function init(){
  await loadRoutes();
  await refresh();
  // refresh UI often; backend polls every 5s
  setInterval(refresh, 2000);
  // refresh route list occasionally (bus counts/routes change)
  setInterval(loadRoutes, 10000);
})();
</script>
</body>
</html>
